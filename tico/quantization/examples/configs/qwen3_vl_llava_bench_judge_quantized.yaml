model:
  family: qwen3_vl
  name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  hf_token: null
  cache_dir: null

runtime:
  device: cuda
  dtype: float32
  seed: 42
  show_progress: true

calibration:
  datasets:
    - dataset: vqav2
      split: testdev
      n_samples: 128
    - dataset: wikitext2
      split: train
      n_samples: 128
  seq_len: 2048

model_args:
  vision:
    grid_thw: [8, 24, 24]
    visual_start_idx: 0
    spatial_merge_size: 2

pipeline:
  - name: spinquant
    enabled: true
    init_method: random
    disable_r1: false
    disable_r2: false
    disable_deepstack_fusion: false
    r1_path: null
    r2_map_path: null

  - name: smoothquant
    enabled: false
    alpha: 0.5
    components: both
    custom_alpha_map: null

  - name: gptq
    enabled: true
    weight_bits: 4
    weight_bits_overrides: {}
    perchannel: true
    symmetric: false
    mse: mse
    sensitivity: null
    percdamp: 0.01
    groupsize: -1
    actorder: true
    static_groups: false
    verbose: false
    show_progress: true
    quantize_vision: true
    quantize_text: true
    quantize_lm_head: false
    quantize_vision_patch_embed: true
    quantize_vision_blocks: true
    quantize_vision_merger: true
    quantize_vision_deepstack_mergers: true
    quantize_text_layers: true
    move_cache_to_cpu: false

  - name: ptq
    enabled: true
    activation: int16
    linear_weight: uint4
    vision_patch_embed_weight: uint8
    embedding_weight: uint8
    lm_head_weight: uint8
    norm: int16
    norm_weight: int16
    strict_wrap: true

evaluation:
  enabled: true

  vlm_tasks: []
  coco: false

  # Legacy COCO-style LLaVA-Bench path should stay disabled.
  # Use the judge-based path below instead.
  llava_bench:
    enabled: true
    mode: judge

    n_samples: 50
    start_index: 0

    max_seq_len: 2048
    max_new_tokens: 512
    temperature: 0.0

    # Important for seq_len=2048. This caps visual tokens.
    image_max_pixels: 802816
    image_min_pixels: null
    resized_height: null
    resized_width: null
    visual_token_margin: 256
    skip_too_long: true

    output_dir: ./out/qwen3_vl_llava_bench_judge_quantized

    # Optional but recommended for FP-vs-quant regression.
    # Set this to the FP answer JSONL generated in step 1.
    baseline_answers_path: ./out/qwen3_vl_llava_bench_judge/answers.jsonl

    # Leave null to generate quantized candidate answers.
    candidate_answers_path: null

    write_answers: true
    write_reviews: true

    judge:
      enabled: true
      model_id: meta-llama/Llama-3.2-3B-Instruct
      device: cuda
      dtype: bfloat16
      max_new_tokens: 512
      temperature: 0.0
      swap_order: true

  mmlu:
    enabled: false
  hellaswag:
    enabled: false
  mmmu:
    enabled: false
  ppl:
    enabled: false

export:
  enabled: false
  output_dir: ./out/qwen3_vl_llava_bench_judge_quantized
  artifacts:
    - ptq_checkpoint
